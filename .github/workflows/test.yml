name: test

on:
  push:
    branches: [main, dev]
  pull_request:

# Cancel superseded runs — a newer push to the same branch/PR makes the in-flight run moot (saves CI).
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # Zero-dependency project — no install step. `node --test` discovers test/**/*.test.mjs.
      - run: node --test
