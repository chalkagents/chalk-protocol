# Publish to npm on a version tag — via npm TRUSTED PUBLISHING (OIDC): no long-lived NPM_TOKEN
# secret; provenance attestation comes with it. One-time setup on npmjs.com: register this repo
# (chalkagents/chalk-protocol) + this workflow file as the package's trusted publisher.
#
# The tag is cut locally by chalk itself (`chalk release --commit` → bumps package.json + CHANGELOG,
# commits them, then tags vX.Y.Z on that commit and `git push --follow-tags`). The tagged tree
# already carries the bumped version, so the workflow publishes it as-is — no normalization step.
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing / --provenance
# Serialize releases and NEVER cancel an in-flight publish — a half-cancelled release is worse than a wait.
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # bundles npm ≥ 11.5.1 (trusted-publishing minimum)
          registry-url: 'https://registry.npmjs.org'
      - run: node --test
      - run: npm publish --provenance --access public
