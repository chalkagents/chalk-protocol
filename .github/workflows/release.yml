# Publish to npm on a version tag — via npm TRUSTED PUBLISHING (OIDC): no long-lived NPM_TOKEN
# secret; provenance attestation comes with it. One-time setup on npmjs.com: register this repo
# (chalkagents/chalk-protocol) + this workflow file as the package's trusted publisher.
#
# The tag is cut locally by chalk itself (`chalk release` → bumps package.json + CHANGELOG, tags
# vX.Y.Z, then `git push --follow-tags`). chalk tags BEFORE writing the bump (tag-collision safety),
# so the tagged commit can carry the pre-bump version — the workflow normalizes from the tag name,
# which is idempotent when the bump did land. Follow-up task filed: `chalk release --commit`.
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing / --provenance
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # bundles npm ≥ 11.5.1 (trusted-publishing minimum)
          registry-url: 'https://registry.npmjs.org'
      - run: node --test
      - run: npm pkg set version="${GITHUB_REF_NAME#v}"
      - run: npm publish --provenance --access public
