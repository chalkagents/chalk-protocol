name: Bug report
description: Something chalk did wrong — a gate misfired, a command crashed, output was misleading.
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Chalk version
      description: "`chalk help | head -1` or the npm version you installed."
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: chalk doctor output
      description: "Paste the output of `chalk doctor` (or `chalk doctor --json` if available) run in the affected project."
      render: text
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: What happened, and how to reproduce it
      description: The command you ran, what you expected, what you got. Include the exact output if you can.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS / Node version
      placeholder: "macOS 15 / Node 22"
    validations:
      required: false
